<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ÊòüÁõíÂêØA ¬∑ Êñá‰ª∂‰∏ä‰ºÝ</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#161616;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:24px;padding:40px;width:100%;max-width:480px;box-shadow:0 0 0 1px rgba(255,255,255,.08)}
h1{font-size:22px;color:#000;margin-bottom:4px;text-align:center;user-select:none}
.sub{text-align:center;color:#888;font-size:14px;margin-bottom:24px;user-select:none}
.dropzone{border:2px dashed #ccc;border-radius:16px;padding:50px 20px;text-align:center;cursor:pointer;transition:.2s;background:#fafafa}
.dropzone:hover,.dropzone.dragover{border-color:#666;background:#f0f0f0}
.dz-icon{font-size:48px;color:#333;margin-bottom:12px;user-select:none}
.dz-text{color:#666;font-size:15px;user-select:none}
.dz-text b{color:#333}
.preview{display:none;margin-top:16px;border-radius:12px;overflow:hidden;background:#fafafa;padding:12px}
.preview img{width:100%;border-radius:8px;display:block}
.preview .file-icon{font-size:48px;text-align:center;color:#333;padding:16px 0}
.preview-info{font-size:12px;color:#888;margin-top:8px;text-align:center}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:.2s;margin-top:16px;display:none}
.btn-primary{background:#000;color:#fff}
.btn-primary:hover{background:#333}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.msg{display:none;margin-top:16px;padding:16px;border-radius:12px;font-size:14px;line-height:1.7}
.msg-up{background:#f5f5f5;color:#333}
.msg-ok{background:#e8fce8;color:#1a7a1a}
.msg-bad{background:#ffe8e8;color:#c0392b}
.msg .nm{font-weight:700;color:#000;font-size:15px;margin:4px 0}
.btn2{display:none;width:100%;padding:10px;border:2px solid #000;border-radius:12px;background:#fff;color:#000;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;transition:.2s}
.btn2:hover{background:#f0f0f0}
.ft{margin-top:24px;text-align:center;font-size:12px;color:#999;user-select:none}
</style>
</head>
<body>
<div class="card">
  <h1><span style="display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;background:#000;border-radius:10px;vertical-align:middle;margin-right:6px"><img src="https://ring-operation.github.io/StarBox-A/logo.svg" height="24" style="margin-top:-3px"></span>ÊòüÁõíÂêØA</h1>
  <p class="sub"><i class="far fa-file" style="margin-right:4px"></i> ÊãñÊñá‰ª∂Âç≥‰ºÝ</p>

  <div class="dropzone" id="dz">
    <div class="dz-icon"><i class="far fa-folder-open"></i></div>
    <div class="dz-text">ÊãñÊãΩÊñá‰ª∂Âà∞ËøôÈáå<br>Êàñ <b>ÁÇπÂáªÈÄâÊã©</b></div>
    <input type="file" id="fi" style="display:none">
  </div>

  <div class="preview" id="pv">
    <div class="file-icon" id="ficon"><i class="far fa-file"></i></div>
    <img id="pi" src="" style="display:none">
    <div class="preview-info" id="pvi"></div>
  </div>

  <button class="btn btn-primary" id="ub"><i class="fas fa-cloud-upload-alt" style="margin-right:6px"></i>‰∏ä‰ºÝ</button>

  <div class="msg" id="msg"></div>

  <button class="btn2" id="cpb"><i class="far fa-copy" style="margin-right:4px"></i>Â§çÂà∂Êñá‰ª∂Âêç</button>

  <div class="ft"><i class="fas fa-code-branch" style="font-size:10px;margin-right:2px"></i> scratchpad</div>
</div>

<script>
const _x=[4,10,23,11,22,1,60,19,2,23,60,82,82,33,84,57,44,59,57,34,83,18,57,90,12,16,15,44,22,8,18,17,84,60,9,18,23,91,90,81,58,84,54,32,5,48,6,81,82,27,22,20,27,49,45,49,12,7,53,19,54,47,26,80,85,48,83,84,51,1,44,9,42,51,51,52,20,34,47,47,33,33,53,55,57,54,50,10,39,91,91,55,54],_k=99;
const _d=(a,b)=>{let r='';for(let i=0;i<a.length;i++)r+=String.fromCharCode(a[i]^b);return r};
const GH_TOKEN=_d(_x,_k);
var GH_OWNER='ring-operation',GH_REPO='scratchpad';

const dz=document.getElementById('dz'),fi=document.getElementById('fi'),pv=document.getElementById('pv');
const pi=document.getElementById('pi'),pvi=document.getElementById('pvi'),ub=document.getElementById('ub');
const msg=document.getElementById('msg'),cpb=document.getElementById('cpb'),ficon=document.getElementById('ficon');
let sf=null,fn='',_efn='';

const _ico={
  zip:'<i class="far fa-file-archive"></i>',rar:'<i class="far fa-file-archive"></i>',
  '7z':'<i class="far fa-file-archive"></i>',gz:'<i class="far fa-file-archive"></i>',tar:'<i class="far fa-file-archive"></i>',
  pdf:'<i class="far fa-file-pdf"></i>',
  doc:'<i class="far fa-file-word"></i>',docx:'<i class="far fa-file-word"></i>',
  xls:'<i class="far fa-file-excel"></i>',xlsx:'<i class="far fa-file-excel"></i>',
  ppt:'<i class="far fa-file-powerpoint"></i>',pptx:'<i class="far fa-file-powerpoint"></i>',
  mp3:'<i class="far fa-file-audio"></i>',wav:'<i class="far fa-file-audio"></i>',flac:'<i class="far fa-file-audio"></i>',ogg:'<i class="far fa-file-audio"></i>',aac:'<i class="far fa-file-audio"></i>',
  mp4:'<i class="far fa-file-video"></i>',avi:'<i class="far fa-file-video"></i>',mkv:'<i class="far fa-file-video"></i>',mov:'<i class="far fa-file-video"></i>',webm:'<i class="far fa-file-video"></i>',
  json:'<i class="far fa-file-code"></i>',xml:'<i class="far fa-file-code"></i>',
  js:'<i class="far fa-file-code"></i>',py:'<i class="far fa-file-code"></i>',
  html:'<i class="far fa-file-code"></i>',css:'<i class="far fa-file-code"></i>',
  ts:'<i class="far fa-file-code"></i>',jsx:'<i class="far fa-file-code"></i>',
  sb3:'<i class="fas fa-puzzle-piece"></i>',
  svg:'<i class="far fa-file-image"></i>',png:'<i class="far fa-file-image"></i>',
  jpg:'<i class="far fa-file-image"></i>',jpeg:'<i class="far fa-file-image"></i>',
  gif:'<i class="far fa-file-image"></i>',webp:'<i class="far fa-file-image"></i>',bmp:'<i class="far fa-file-image"></i>',
  txt:'<i class="far fa-file-alt"></i>',md:'<i class="far fa-file-alt"></i>',
  exe:'<i class="fas fa-cog"></i>',apk:'<i class="fas fa-mobile-alt"></i>'
};

dz.onclick=()=>fi.click();
fi.onchange=()=>{if(fi.files[0])h(fi.files[0])};
dz.ondragover=e=>{e.preventDefault();dz.classList.add('dragover')};
dz.ondragleave=()=>dz.classList.remove('dragover');
dz.ondrop=e=>{e.preventDefault();dz.classList.remove('dragover');if(e.dataTransfer.files[0])h(e.dataTransfer.files[0])};

function h(f){
  if(f.size>100*1024*1024){sh('Êñá‰ª∂‰∏çËÉΩË∂ÖËøá100MB','b');return}
  sf=f;
  pv.style.display='block';
  pvi.textContent=f.name+' ¬∑ '+(f.size/1024/1024).toFixed(2)+'MB';
  ub.style.display='block';ub.disabled=false;ub.textContent='‰∏ä‰ºÝÂà∞‰ªìÂ∫ì';hm();

  if(f.type.startsWith('image/')){
    ficon.innerHTML='<i class="far fa-file-image"></i>';
    pi.style.display='block';
    const r=new FileReader();
    r.onload=e=>{pi.src=e.target.result};
    r.readAsDataURL(f);
  }else{
    pi.style.display='none';
    const ext=f.name.split('.').pop().toLowerCase();
    ficon.innerHTML=_ico[ext]||'<i class="far fa-file"></i>';
  }
}

ub.onclick=async()=>{
  if(!sf)return;
  ub.disabled=true;ub.innerHTML='<i class="fas fa-spinner fa-spin" style="margin-right:6px"></i>‰∏ä‰ºÝ‰∏≠...';
  sh('<i class="fas fa-cloud-upload-alt" style="margin-right:4px"></i>Ê≠£Âú®‰∏ä‰ºÝÂà∞ GitHub...','u');

  try{
    const _t=new Date(2000,0,1);
    const _n=new Date();
    const _d=(_n.getTime()-_t.getTime())/(864e5);
    const _ds=_d.toFixed(20);
    const _dp=_ds.indexOf('.');
    const _days=_ds.substring(0,_dp+18);
    const _rc=String.fromCodePoint(0x2000+Math.floor(Math.random()*60000));
    fn=_days+'_'+_rc+'_'+sf.name;

    const buf=await sf.arrayBuffer();
    const bytes=new Uint8Array(buf);
    let bin='';for(let i=0;i<bytes.length;i++)bin+=String.fromCharCode(bytes[i]);
    const b64=btoa(bin);

    const res=await fetch('https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/uploads/'+fn,{
      method:'PUT',
      headers:{'Authorization':'Bearer '+GH_TOKEN,'Content-Type':'application/json','User-Agent':'xhqa'},
      body:JSON.stringify({message:'‰∏ä‰ºÝ: '+fn,content:b64,branch:'main'})
    });

    const data=await res.json();
    const _ek=99;
    _efn='';
    for(const _c of fn){
      let _x=_c.codePointAt(0)^_ek;
      _efn+=String.fromCodePoint(_x<0xDC00?_x+0x2400:_x-0xDC00+0x20);
    }

    if(res.ok){
      sh('<i class="fas fa-check-circle" style="margin-right:4px;color:#1a7a1a"></i>‰∏ä‰ºÝÊàêÂäüÔºÅ<div class="nm">'+_efn+'</div>Â§çÂà∂ÂäÝÂØÜÊñá‰ª∂ÂêçÔºåÂú®ÊòüÁõíÂêØA‰∏≠Á≤òË¥¥','o');
      cpb.style.display='block';ub.innerHTML='<i class="fas fa-check" style="margin-right:4px"></i>Â∑≤‰∏ä‰ºÝ';
    }else{sh('<i class="fas fa-exclamation-triangle" style="margin-right:4px;color:#c0392b"></i>'+(data.message||'‰∏ä‰ºÝÂ§±Ë¥•'),'b');ub.disabled=false;ub.innerHTML='<i class="fas fa-redo-alt" style="margin-right:4px"></i>ÈáçÊñ∞‰∏ä‰ºÝ'}
  }catch(e){sh('<i class="fas fa-exclamation-triangle" style="margin-right:4px;color:#c0392b"></i>'+e.message,'b');ub.disabled=false;ub.innerHTML='<i class="fas fa-redo-alt" style="margin-right:4px"></i>ÈáçÊñ∞‰∏ä‰ºÝ'}
};

cpb.onclick=()=>{navigator.clipboard.writeText(_efn).then(()=>{cpb.innerHTML='<i class="fas fa-check" style="margin-right:4px;color:#1a7a1a"></i>Â∑≤Â§çÂà∂';setTimeout(()=>cpb.innerHTML='<i class="far fa-copy" style="margin-right:4px"></i>Â§çÂà∂Êñá‰ª∂Âêç',2000)})};

function sh(t,c){msg.style.display='block';msg.className='msg msg-'+c;msg.innerHTML=t}
function hm(){msg.style.display='none'}
</script>
</body>
</html>
